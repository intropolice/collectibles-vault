version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: collectibles_vault_db
    environment:
      POSTGRES_USER: collectibles_user
      POSTGRES_PASSWORD: collectibles_pass
      POSTGRES_DB: collectibles_vault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collectibles_user -d collectibles_vault"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - collectibles_network

  api:
    build: .
    container_name: collectibles_vault_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://collectibles_user:collectibles_pass@db:5432/collectibles_vault
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEBUG: ${DEBUG:-False}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - collectibles_network

volumes:
  postgres_data:

networks:
  collectibles_network:
    driver: bridge
